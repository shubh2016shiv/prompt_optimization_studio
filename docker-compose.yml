# =============================================================================
# APOST - Docker Compose Configuration
# For local development and deployment
# =============================================================================

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: apost-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  apost:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apost
    ports:
      - "8000:8000"
    environment:
      # App Configuration
      - DEBUG=false
      - CORS_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
      
      # LLM API Keys (set via .env file or environment)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      
      # Optimizer Configuration
      - OPTIMIZER_MODEL=claude-sonnet-4-20250514
      - MAX_TOKENS_GAP_ANALYSIS=1500
      - MAX_TOKENS_OPTIMIZATION=4096
      - MAX_TOKENS_CHAT=2048
      - REDIS_URL=redis://redis:6379/0
      - REDIS_FAIL_FAST=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

